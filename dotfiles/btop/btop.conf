# btop — Moniteur Système TUI
# Ref: https://github.com/aristocratos/btop#configurability

# Thème de couleur (Catppuccin pour cohérence avec Ghostty/Delta)
color_theme = "/usr/share/btop/themes/catppuccin_mocha.theme"

# Préréglage de thème si le fichier n'existe pas
theme_background = False

# Intervalle de rafraîchissement (ms)
update_ms = 1500

# Afficher les processus en arbre par défaut
proc_tree = True

# Trier par utilisation CPU par défaut
proc_sorting = "cpu lazy"

# Afficher les infos CPU détaillées
show_detailed_cpu = True

# Afficher les températures
show_temps = True

# Unité de température (celsius / fahrenheit)
temp_scale = "celsius"

# Afficher les disques
show_disks = True

# Afficher les I/O disque
show_io_stat = True

# Réseau : afficher le graphique
show_net = True

# Arrondir les coins des graphiques (esthétique)
rounded_corners = True

# Nombre de logs processeur à afficher
proc_per_core = False

# Afficher la batterie (laptops)
show_battery = True

# Graphe CPU : style de remplissage (braille / block / tty)
graph_symbol_cpu = "braille"
graph_symbol_mem = "braille"
graph_symbol_net = "braille"
