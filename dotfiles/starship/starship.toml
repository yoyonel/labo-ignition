# Starship Prompt Configuration
# Ref: https://starship.rs/config/

# Timeout pour les commandes externes (ms)
command_timeout = 1000

# Format global du prompt
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_metrics\
$docker_context\
$python\
$rust\
$golang\
$nodejs\
$lua\
$java\
$c\
$cmd_duration\
$line_break\
$character"""

# Caractère du prompt
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# Répertoire courant
[directory]
truncation_length = 4
truncation_symbol = "…/"
style = "bold cyan"
read_only = " 🔒"
# Substitutions pour raccourcir les chemins fréquents
[directory.substitutions]
"Documents" = "📄"
"Downloads" = "📥"
"Prog" = "💻"

# Git : branche
[git_branch]
symbol = " "
style = "bold purple"
truncation_length = 24
truncation_symbol = "…"

# Git : statut (modifié, staged, untracked, etc.)
[git_status]
style = "bold red"
conflicted = "⚔️ "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Git : métriques (lignes ajoutées/supprimées)
[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"

# Durée de la dernière commande (si > 2s)
[cmd_duration]
min_time = 2000
format = "took [$duration](bold yellow) "
show_milliseconds = false

# Docker
[docker_context]
symbol = "🐳 "
style = "blue bold"
only_with_files = true

# Python
[python]
symbol = "🐍 "
style = "yellow bold"
detect_files = ["requirements.txt", "setup.py", "pyproject.toml", "Pipfile", ".python-version"]

# Rust
[rust]
symbol = "🦀 "
style = "bold red"

# Go
[golang]
symbol = "🐹 "
style = "bold cyan"

# Node.js
[nodejs]
symbol = " "
style = "bold green"

# Lua
[lua]
symbol = "🌙 "
style = "bold blue"

# Java
[java]
symbol = "☕ "
style = "bold red"

# C / C++
[c]
symbol = "⚙️ "
style = "bold blue"

# Username (affiché uniquement en SSH ou root)
[username]
show_always = false
style_user = "bold dimmed blue"
style_root = "bold red"

# Hostname (affiché uniquement en SSH)
[hostname]
ssh_only = true
style = "bold dimmed green"
