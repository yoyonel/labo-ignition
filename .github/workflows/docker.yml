name: Docker

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Container Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: labo-ci-test:latest
          build-args: |
            USER_ID=1000
            USER_NAME=github
          secrets: |
            "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run CLI tools integration tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/home/github/project:ro" \
            labo-ci-test:latest \
            bash /home/github/project/tests/test-cli-tools.sh

      - name: Trivy vulnerability scan (Table output for logs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: labo-ci-test:latest
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy vulnerability scan (SARIF output for Security tab)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: labo-ci-test:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Fix Trivy SARIF URI (Normalization for GitHub)
        if: always()
        run: |
          # Remplace le schéma 'labo-ci-test:latest' par un chemin relatif vers le Dockerfile
          # pour que GitHub accepte d'importer le rapport de sécurité.
          sed -i 's/labo-ci-test:latest/Dockerfile/g' trivy-results.sarif

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

  publish:
    name: Publish To GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            USER_ID=1000
            USER_NAME=github
          secrets: |
            "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Final job to provide a single 'Docker' status check
  docker-status:
    name: Docker
    needs: [build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check status
        run: |
          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "Docker build passed"
            exit 0
          elif [[ "${{ needs.build.result }}" == "skipped" ]]; then
            echo "Docker build skipped (normal)"
            exit 0
          else
            echo "Docker build failed"
            exit 1
          fi
