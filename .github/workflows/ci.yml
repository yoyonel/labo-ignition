name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shell-and-tests:
    name: Shell And Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck check_links.sh test_infra.sh scripts/*.sh tests/*.sh

      - name: Run Ghostty integration suite
        run: bash tests/test-ghostty-integration.sh

  documentation:
    name: Documentation Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate documentation links
        run: |
          chmod +x check_links.sh
          find . -maxdepth 2 -name "*.md" -print0 | sort -z | while IFS= read -r -d '' file; do
            ./check_links.sh "$file"
          done

  dockerfile:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
